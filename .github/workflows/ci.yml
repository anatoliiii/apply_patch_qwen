name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOCACHE: /tmp/go-build-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

  release-dry-check:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOCACHE: /tmp/go-build-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate release packaging
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh dry-run
