name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            stage="dist/apply_patch_qwen_${version}_${goos}_${goarch}"
            archive="${stage}.tar.gz"

            mkdir -p "${stage}/bin"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "${stage}/bin/qwen-apply-patch-mcp" ./cmd/qwen-apply-patch-mcp
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "${stage}/bin/qwen-apply-patch-tool" ./cmd/qwen-apply-patch-tool

            cp README.md LICENSE install.sh "${stage}/"
            chmod +x "${stage}/install.sh"
            tar -C dist -czf "${archive}" "$(basename "${stage}")"
            rm -rf "${stage}"
          done

          (
            cd dist
            sha256sum ./*.tar.gz > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
