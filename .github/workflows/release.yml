name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOCACHE: /tmp/go-build-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Install

            One-line install:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/anatoliiii/apply_patch_qwen/main/scripts/install-from-release.sh | sh
            ```

            Pin this version:

            ```bash
            VERSION=${{ github.ref_name }} curl -fsSL https://raw.githubusercontent.com/anatoliiii/apply_patch_qwen/main/scripts/install-from-release.sh | sh
            ```

            Or download the archive for your platform, extract it, and run `./install.sh`.
